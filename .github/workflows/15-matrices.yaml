name: 15 - Working with Matrices
on:
  workflow_dispatch:

jobs:
  backward-compatibility:
    # Specifies the runner environment where the job will execute.
    runs-on: ${{ matrix.operating-system }}
    name: ${{ matrix.operating-system }} - ${{ matrix.node-version }}
    strategy:
      # fail-fast: Determines whether to cancel all in-progress jobs if any matrix job fails.
      # When set to true, GitHub will cancel all running jobs as soon as one job fails.
      # This helps save resources and CI/CD minutes by stopping unnecessary builds when an error is detected.
      # Set to false if you want all matrix jobs to complete regardless of individual failures.
      # fail-fast Documentation
      # The default value for fail-fast is true, meaning that if any job in the matrix fails, all other jobs that are still running will be cancelled immediately. Setting fail-fast to false allows all jobs to run to completion even if one or more jobs fail.
      # fail-fast: true
      # When set to true, GitHub Actions cancels all in-progress jobs if any matrix job fails.
      # However, some jobs may still show as "passed" instead of "cancelled" in these cases:
      # 1. Jobs that completed successfully before the failing job started
      # 2. Jobs running on different runners with network latency in cancellation signals
      # 3. Jobs in the final stages of completion when cancellation is triggered
      # 4. Jobs that don't poll for cancellation signals frequently enough
      # 5. Concurrent jobs that started before failure detection but completed during cancellation
      fail-fast: true
      matrix:
        node-version: [18.x, 20.x, 21.x]
        operating-system: [ubuntu-latest, windows-latest]
        # The 'include' keyword allows you to add specific job configurations to a matrix strategy.
        # It enables you to include additional combinations that might not be generated by the standard matrix expansion.
        # Use case: Add a specific Node.js version (16.x) on Ubuntu that you want to test in addition to other matrix combinations,
        # or run a particular configuration that differs from your standard matrix parameters.
        include:
          - node-version: 16.x
            operating-system: ubuntu-latest
          - node-version: 21.x
            operating-system: ubuntu-latest
            tag: experimental
    steps:
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Fail if experimental tag is present
        if: ${{ matrix.tag == 'experimental' }}
        run: |
          echo "This is an experimental configuration. Failing the job intentionally."
          exit 1
      - name: Perform some tests
        run: |
          echo "Running tests on OS ${{ matrix.operating-system }} and NodeJS ${{ matrix.node-version }}"
  include-example:
    name: ${{ matrix.color }} - ${{ matrix.shape }} - ${{ matrix.size }} - ${{ matrix.opacity }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        color: [red, green]
        shape: [circle, square]
        size: [small, large]
        # Includes additional matrix configurations that extend or override the base matrix combinations.
        include:
          # When a new key is introduced in 'includes', it allows you to:
          # 1. Add extra job configurations beyond the standard matrix product
          # 2. Override specific matrix variable values for targeted job runs
          # 3. Combine multiple matrix variables with custom key-value pairs
          # In this example, 'opacity: 50' adds a new variable to selected matrix combinations,
          # enabling fine-grained control over which jobs receive which configuration values.
          - opacity: 50
          - color: red
            shape: triangle
        # The 'exclude' keyword allows you to remove specific job configurations from a matrix strategy.
        # It is processed after the matrix combinations are generated (before include), filtering out any combinations that match the specified criteria.
        # exclude filters out any and all matrix combinations even if they are partially matched.
        # For example, if you exclude color: green and shape: circle, any combination that includes both of those values will be excluded, regardless of the other matrix variables (size and opacity).
        # Use case: If certain combinations of variables (e.g., color and shape) do not make sense for your tests, you can exclude them to avoid running unnecessary jobs. For instance, if you have a matrix that tests different colors and shapes, but the combination of green circles is not relevant for your testing scenario, you can use exclude to filter out that specific combination from the matrix.
        exclude:
          # Exclude specific matrix combinations that are not relevant or valid for testing.
          # Use case: If certain combinations of variables (e.g., color and shape) do not make sense for your tests,
          # you can exclude them to avoid running unnecessary jobs.
          - color: green
            shape: circle
    steps:
      - name: Dummy step
        run: |
          echo "Testing combination: Color=${{ matrix.color }}, Shape=${{ matrix.shape }}, Size=${{ matrix.size }}, Opacity=${{ matrix.opacity }}"