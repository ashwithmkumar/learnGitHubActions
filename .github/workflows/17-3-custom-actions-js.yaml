name: 17-3 Custom Actions - Docker Ping URL`
run-name: 17-3 Custom Actions - Docker Ping URL | URL - ${{ inputs.url }}
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'The URL to ping'
        type: choice
        options:
          - 'https://www.google.com'
          - 'https://www.invalidurl.com'
          - 'invalidSchema'
        required: true
      max_retries:
        description: 'The maximum number of retries to ping the URL'
        required: false
        default: '10'
      delay_interval:
        description: 'The interval (in seconds) between retries'
        required: false
        default: '5'

jobs:
  docker-ping-url:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Ping URL
        uses: ./.github/actions/docker-ping-url
        with:
          url: ${{ inputs.url }}
          max_retries: ${{ inputs.max_retries }}
          delay_interval: ${{ inputs.delay_interval }}