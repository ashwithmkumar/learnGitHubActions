name: 12 - Working with Outputs
on:
  workflow_dispatch:
    inputs:
      build-status:
        type: choice
        options:
          - success
          - failure
        default: success
jobs:
  build:
    runs-on: ubuntu-latest
    # Each step has its own GitHub output file and they are not shared across steps.
    # To share outputs across steps, you need to use the GITHUB_OUTPUT environment variable to write outputs to a file that can be accessed by subsequent steps.
    steps:
      - name: Print GITHUB_OUTPUT path
        run: |
          echo "GITHUB_OUTPUT is set to: $GITHUB_OUTPUT"
      - name: Build
        id: build
        run: |
          echo "status=${{ inputs.build-status }}" >> "$GITHUB_OUTPUT"
          echo "output1=value1" >> "$GITHUB_OUTPUT"
          echo "output2=value2" >> "$GITHUB_OUTPUT"
          cat "$GITHUB_OUTPUT"
          echo "mistake=true" > "$GITHUB_OUTPUT"
          cat "$GITHUB_OUTPUT"
    outputs:
      build-status: ${{ steps.build.outputs.status }}
      output1: ${{ steps.build.outputs.output1 }}
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ needs.build.outputs.build-status == 'success' }}
    steps:
      - name: Deploy
        run: |
          echo "Deploying"
      - name: Print Outputs
        run: |
          # At this point, the GitHub output file from the build step has been processed and the outputs should be available as environment variables in this step.
          # But since we overwrote the GitHub output file in the build step, the outputs will not be available as expected.
          # The outputs - status, output1, and output2 - from the GitHub file have been overwritten by the mistake step, so they will not be accessible in this step.
          echo "Output1: ${{needs.build.outputs.output1}}"